<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>EBLG Dashboard PRO+</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <!-- MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ======================================================
         SIDEBAR
    ====================================================== -->
    <div id="sidebar">

        <div id="sidebar-tabs">
            <button data-tab="metar">METAR</button>
            <button data-tab="taf">TAF</button>
            <button data-tab="fids">FIDS</button>
            <button data-tab="sono">Sonomètres</button>
            <button data-tab="logs">Logs</button>
        </div>

        <div id="sidebar-panels">

            <div class="panel" id="panel-metar">
                <pre id="metar"></pre>
                <div id="runway-active"></div>
            </div>

            <div class="panel hidden" id="panel-taf">
                <pre id="taf"></pre>
            </div>

            <div class="panel hidden" id="panel-fids">
                <div id="fids-arrivals"></div>
                <div id="fids-departures"></div>
            </div>

            <div class="panel hidden" id="panel-sono">
                <div id="sono-list"></div>
            </div>

            <div class="panel hidden" id="panel-logs">
                <div id="logs"></div>
                <div id="logs-live"></div>
            </div>

        </div>

    </div>

    <!-- ======================================================
         DETAIL PANEL
    ====================================================== -->
    <div id="detail-panel" class="detail-panel hidden">
        <h2 id="detail-title">—</h2>
        <p><b>Adresse :</b> <span id="detail-address">—</span></p>
        <p><b>Commune :</b> <span id="detail-town">—</span></p>
        <p><b>Statut :</b> <span id="detail-status">—</span></p>
        <p><b>Distance piste :</b> <span id="detail-distance">—</span></p>
    </div>

    <!-- ======================================================
         MAP
    ====================================================== -->
    <div id="map"></div>

    <!-- ======================================================
         DEBUG PANEL
    ====================================================== -->
    <div id="debug-panel" class="debug-panel">
        <div>FPS : <span id="fps">0</span></div>
        <div>CPU : <span id="cpu">0</span> ms</div>
        <div>Render : <span id="render">0</span> ms</div>
    </div>

    <!-- ======================================================
         FLOATING BUTTONS
    ====================================================== -->
    <div class="floating-buttons">
        <button id="btn-reset-zoom" class="float-btn">Reset Zoom</button>
    </div>

    <!-- ======================================================
         JAVASCRIPT (optimisé)
    ====================================================== -->

    <!-- Leaflet core -->
    <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- MarkerCluster -->
    <script defer src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

    <!-- Heatmap plugin -->
    <script defer src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <!-- PolylineDecorator plugin -->
    <script defer src="https://unpkg.com/leaflet-polylinedecorator"></script>

    <!-- App -->
    <!-- CONFIG (doit être chargé en premier) -->
    <script type="module" src="js/config.js"></script>

    <!-- Modules de base -->
    <script type="module" src="js/helpers.js"></script>
    <script type="module" src="js/map.js"></script>

    <!-- Modules data -->
    <script type="module" src="js/metar.js"></script>
    <script type="module" src="js/taf.js"></script>
    <script type="module" src="js/fids.js"></script>
    <script type="module" src="js/sonometers.js"></script>

    <!-- Status & logs -->
    <script type="module" src="js/status.js"></script>
    <script type="module" src="js/logs.js"></script>
    <script type="module" src="js/logsLive.js"></script>

    <!-- App (doit être chargé en dernier) -->
    <script type="module" src="js/app.js"></script>

</body>
</html>
